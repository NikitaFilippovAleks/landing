# Dev-окружение: отдельные контейнеры (как в проде) + bind mounts для hot-reload
# Запуск: docker compose -f docker-compose.dev.yml up --build

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    init: true
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://portfolio:portfolio@db:5432/portfolio
      - SECRET_KEY=dev-secret-key-change-in-production
      - REVALIDATE_SECRET=dev-revalidate-secret
      - NEXTJS_REVALIDATE_URL=http://web:3000/api/revalidate
      - PYTHONUNBUFFERED=1
    volumes:
      - ./apps/api:/workspace/apps/api
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - dev

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    init: true
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_URL=http://api:8000
      - NODE_ENV=development
    volumes:
      - ./apps/web:/workspace/apps/web
      - ./packages:/workspace/packages
      - /workspace/apps/web/node_modules
      - /workspace/apps/web/.next
    ports:
      - "3000:3000"
    networks:
      - dev

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      target: dev
    init: true
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://localhost:8000
      - NODE_ENV=development
    volumes:
      - ./apps/admin:/workspace/apps/admin
      - ./packages:/workspace/packages
      - /workspace/apps/admin/node_modules
    ports:
      - "3001:3001"
    networks:
      - dev

  db:
    image: postgres:18
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
      POSTGRES_DB: portfolio
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dev

volumes:
  pgdata:

networks:
  dev:
    driver: bridge
