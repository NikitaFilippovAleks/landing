services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspace:cached
      - node_modules:/workspace/node_modules
      - pnpm_store:/workspace/.pnpm-store
      - pip_cache:/root/.cache/pip
    ports:
      - "3000:3000" # Next.js
      - "3001:3001" # Vite (admin)
      - "8000:8000" # FastAPI
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://portfolio:portfolio@db:5432/portfolio
      - PYTHONUNBUFFERED=1
      - NODE_ENV=development
    command: sleep infinity
    networks:
      - dev

  db:
    image: postgres:18
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
      POSTGRES_DB: portfolio
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dev

volumes:
  node_modules:
  pnpm_store:
  pip_cache:
  pgdata:

networks:
  dev:
    driver: bridge
