# Prod-конфигурация для деплоя на VPS (Dokploy)
# Образы собираются в GitHub Actions и пушатся в ghcr.io
#
# Перед запуском создайте .env файл (см. .env.example)

services:
  api:
    image: ghcr.io/nikitafilippovaleks/portfolio-api:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - REVALIDATE_SECRET=${REVALIDATE_SECRET}
      - NEXTJS_REVALIDATE_URL=http://web:3000/api/revalidate
      - DEBUG=false
    networks:
      - app
      - dokploy-network

  web:
    image: ghcr.io/nikitafilippovaleks/portfolio-web:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000
    networks:
      - app
      - dokploy-network

  admin:
    image: ghcr.io/nikitafilippovaleks/portfolio-admin:latest
    pull_policy: always
    restart: unless-stopped
    networks:
      - app
      - dokploy-network

  db:
    image: postgres:18
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: portfolio
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

volumes:
  pgdata:

networks:
  app:
    driver: bridge
  dokploy-network:
    external: true
