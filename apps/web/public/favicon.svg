<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Фоновый градиент -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>
    <!-- Основной градиент для букв -->
    <linearGradient id="letters" x1="80" y1="100" x2="432" y2="412" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="60%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <!-- Свечение -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Фон со скруглёнными углами -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Тонкая рамка-акцент -->
  <rect x="2" y="2" width="508" height="508" rx="94" stroke="#7C3AED" stroke-opacity="0.15" stroke-width="2" fill="none"/>

  <!-- Буквы NF с градиентом и свечением -->
  <g filter="url(#glow)">
    <!-- N -->
    <path d="M88 392V120h36l96 180V120h36v272h-36L124 212v180H88Z" fill="url(#letters)"/>
    <!-- F -->
    <path d="M296 392V120h148v34H332v62h96v34h-96v142h-36Z" fill="url(#letters)"/>
  </g>
</svg>
